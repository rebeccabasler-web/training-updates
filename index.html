<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Training Updates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4; --ink: #1A1A18; --ink2: #4A4A46; --ink3: #8A8A84;
    --rule: #E5E2DA; --rule2: #D0CCC2;
    --green-bg: #EAF3DE; --green-tx: #3B6D11;
    --amber-bg: #FAEEDA; --amber-tx: #854F0B;
    --red-bg: #FCEBEB;   --red-tx: #A32D2D;
    --blue-bg: #E6F1FB;  --blue-tx: #185FA5;
    --purple-bg: #F0EAFB; --purple-tx: #6B3FA0;
    --card: #FFFFFF; --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .page { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* Header */
  .site-header { border-bottom: 1px solid var(--rule2); padding-bottom: 1.25rem; margin-bottom: 1.5rem; }
  .site-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .site-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); letter-spacing: -0.01em; line-height: 1.1; }
  .site-subtitle { font-size: 13px; color: var(--ink3); margin-top: 4px; }
  .save-indicator { font-size: 12px; color: var(--ink3); display: flex; align-items: center; gap: 5px; }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-tx); display: inline-block; }
  .save-dot.saving { background: var(--amber-tx); animation: pulse 1s infinite; }
  .save-dot.error { background: var(--red-tx); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* Nav tabs */
  .main-nav { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--rule); padding-bottom: 0; flex-wrap: wrap; }
  .nav-tab { padding: 8px 16px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; border: none; background: none; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap; }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .nav-tab .tab-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--red-bg); color: var(--red-tx); margin-left: 5px; font-weight: 600; }

  /* Cohort bar */
  .cohort-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; padding: 10px 14px; background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); box-shadow: var(--shadow); }
  .cohort-bar label { font-size: 12px; color: var(--ink3); white-space: nowrap; font-weight: 500; }
  .cohort-bar select { font-size: 13px; padding: 5px 10px; border-radius: 7px; border: 1px solid var(--rule2); background: var(--cream); color: var(--ink); cursor: pointer; min-width: 200px; outline: none; }
  .cohort-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  /* Buttons */
  .btn { font-size: 13px; padding: 7px 14px; border-radius: 7px; border: 1px solid var(--rule2); background: var(--card); color: var(--ink2); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; transition: background .15s; white-space: nowrap; }
  .btn:hover { background: var(--cream); }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { background: #333; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }
  .btn-ghost { border: none; background: none; color: var(--ink3); padding: 4px 6px; }
  .btn-ghost:hover { color: var(--ink); background: var(--cream); }

  /* Week tabs */
  .week-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .week-tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--rule2); background: var(--card); color: var(--ink3); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all .15s; }
  .week-tab:hover:not(.active) { background: var(--cream); color: var(--ink2); }
  .week-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .week-tab-sub { display: block; font-size: 11px; font-weight: 400; margin-top: 1px; color: var(--ink3); }
  .week-tab.active .week-tab-sub { color: rgba(255,255,255,.5); }

  /* Entry cards */
  .entry-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .entry-card:hover { border-color: var(--rule2); }
  .entry-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; flex-wrap: wrap; }
  .entry-header:hover { background: var(--cream); }
  .entry-date { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--ink); white-space: nowrap; }
  .entry-preview { font-size: 12px; color: var(--ink3); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .entry-row-actions { display: flex; gap: 2px; margin-left: auto; flex-shrink: 0; align-items: center; }
  .chevron { color: var(--ink3); font-size: 16px; transition: transform .2s; display: inline-block; line-height: 1; }
  .chevron.open { transform: rotate(180deg); }
  .entry-body { padding: 0 16px 14px; border-top: 1px solid var(--rule); }
  .entry-section { margin-top: 12px; }
  .entry-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--ink3); margin-bottom: 5px; }
  .entry-text { font-size: 13px; color: var(--ink2); line-height: 1.7; white-space: pre-wrap; }

  /* Badges */
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 12px; font-weight: 500; }
  .badge-ok    { background: var(--green-bg);  color: var(--green-tx); }
  .badge-warn  { background: var(--amber-bg);  color: var(--amber-tx); }
  .badge-alert { background: var(--red-bg);    color: var(--red-tx); }
  .badge-neutral { background: #F0EDE8; color: var(--ink3); }
  .badge-blue  { background: var(--blue-bg);   color: var(--blue-tx); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-tx); }

  /* Score table */
  .score-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px; }
  .score-table th { text-align: left; padding: 4px 8px; font-size: 11px; color: var(--ink3); font-weight: 500; border-bottom: 1px solid var(--rule); }
  .score-table td { padding: 5px 8px; border-bottom: 1px solid var(--rule); color: var(--ink2); }
  .score-table tr:last-child td { border-bottom: none; }
  .score-pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .sc-hi { background: var(--green-bg); color: var(--green-tx); }
  .sc-mi { background: var(--amber-bg); color: var(--amber-tx); }
  .sc-lo { background: var(--red-bg);   color: var(--red-tx); }

  /* Action items */
  .action-list { list-style: none; }
  .action-list li { font-size: 13px; color: var(--ink2); padding: 3px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.55; }
  .action-list li::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: var(--amber-tx); margin-top: 7px; flex-shrink: 0; }

  /* Archived */
  .archived-notice { padding: 8px 14px; background: var(--amber-bg); border-radius: 8px; font-size: 13px; color: var(--amber-tx); margin-bottom: 12px; font-weight: 500; }

  /* Empty state */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--ink3); font-size: 13px; }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* ── Flagged learners ── */
  .flagged-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .flag-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); border-left: 3px solid var(--red-tx); }
  .flag-card-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .flag-reason { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: var(--ink2); margin-bottom: 4px; line-height: 1.5; }
  .flag-reason::before { content: '⚠'; font-size: 11px; margin-top: 1px; flex-shrink: 0; }
  .no-flags { text-align: center; padding: 2.5rem 1rem; color: var(--ink3); font-size: 13px; }
  .no-flags .nf-icon { font-size: 28px; margin-bottom: 8px; }

  /* ── Learner profiles ── */
  .learner-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
  .learner-chip { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--rule2); background: var(--card); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--ink2); text-align: center; box-shadow: var(--shadow); transition: all .15s; }
  .learner-chip:hover, .learner-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .learner-chip .lc-flag { font-size: 10px; display: block; margin-top: 2px; color: var(--red-tx); }
  .learner-chip.active .lc-flag { color: rgba(255,255,255,.7); }
  .profile-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); }
  .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--rule); }
  .profile-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; flex-shrink: 0; font-family: 'DM Serif Display', serif; }
  .profile-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink); }
  .profile-meta { font-size: 12px; color: var(--ink3); margin-top: 2px; }
  .profile-weeks { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .profile-week-card { background: var(--cream); border: 1px solid var(--rule); border-radius: 8px; padding: 10px 12px; }
  .profile-week-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); margin-bottom: 6px; }
  .profile-week-stat { font-size: 13px; color: var(--ink2); margin-bottom: 3px; }
  .profile-section { margin-bottom: 1rem; }
  .profile-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); margin-bottom: 8px; }
  .mentions-list { font-size: 13px; color: var(--ink2); line-height: 1.65; }
  .mention-item { padding: 6px 0; border-bottom: 1px solid var(--rule); display: flex; gap: 10px; }
  .mention-item:last-child { border-bottom: none; }
  .mention-date { font-size: 11px; color: var(--ink3); white-space: nowrap; margin-top: 2px; min-width: 80px; }
  .mention-text { font-size: 13px; color: var(--ink2); line-height: 1.55; }

  /* ── Summary/Export ── */
  .summary-section { margin-bottom: 1.75rem; }
  .summary-section-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--ink); margin-bottom: .75rem; padding-bottom: .5rem; border-bottom: 1px solid var(--rule2); }
  .summary-week-block { margin-bottom: 1rem; }
  .summary-week-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .summary-week-body { font-size: 13px; color: var(--ink2); line-height: 1.65; }
  .print-btn-bar { display: flex; justify-content: flex-end; margin-bottom: 1.25rem; gap: 8px; }
  .summary-meta { font-size: 12px; color: var(--ink3); margin-bottom: 1.5rem; }
  .summary-flags { display: flex; flex-direction: column; gap: 6px; }
  .summary-flag-row { display: flex; gap: 10px; padding: 8px 12px; background: var(--red-bg); border-radius: 8px; align-items: flex-start; }
  .summary-flag-name { font-size: 13px; font-weight: 600; color: var(--red-tx); min-width: 140px; }
  .summary-flag-reasons { font-size: 12px; color: var(--red-tx); line-height: 1.5; }

  /* ── Cohort comparison ── */
  .comparison-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .comparison-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .comparison-cohort-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .comparison-cohort-sub { font-size: 11px; color: var(--ink3); margin-bottom: 10px; }
  .comp-stat { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--rule); font-size: 13px; }
  .comp-stat:last-child { border-bottom: none; }
  .comp-stat-label { color: var(--ink3); }
  .comp-stat-value { font-weight: 600; color: var(--ink); }
  .comp-bar-wrap { margin-top: 10px; }
  .comp-bar-label { font-size: 11px; color: var(--ink3); margin-bottom: 3px; display: flex; justify-content: space-between; }
  .comp-bar-track { height: 6px; background: var(--cream); border-radius: 3px; border: 1px solid var(--rule); overflow: hidden; }
  .comp-bar-fill { height: 100%; border-radius: 3px; background: var(--ink); transition: width .4s; }
  .comp-empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink3); font-size: 13px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; overflow-y: auto; padding: 1.5rem 1rem; }
  .modal-overlay.open { display: block; }
  .modal { background: var(--card); border-radius: 14px; border: 1px solid var(--rule); padding: 1.5rem; max-width: 580px; margin: 0 auto; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink); margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 11px; }
  .form-row label { display: block; font-size: 12px; color: var(--ink3); margin-bottom: 3px; font-weight: 500; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; font-size: 13px; padding: 8px 11px; border-radius: 8px; border: 1px solid var(--rule2); background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s; }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--ink); }
  .form-row textarea { resize: vertical; min-height: 60px; line-height: 1.55; }
  .form-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--rule); }
  .divider { height: 1px; background: var(--rule); margin: 14px 0; }
  .score-form-row { display: grid; grid-template-columns: 1fr 90px 26px; gap: 6px; align-items: center; margin-bottom: 7px; }
  .score-form-row input { font-size: 12px; padding: 5px 8px; }
  .score-form-wrap { border: 1px solid var(--rule2); border-radius: 8px; padding: 8px 10px; margin-top: 5px; }
  .add-learner-btn { font-size: 12px; color: var(--blue-tx); background: none; border: none; cursor: pointer; padding: 3px 0; margin-top: 5px; font-family: 'DM Sans', sans-serif; }
  .add-learner-btn:hover { text-decoration: underline; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 3rem; color: var(--ink3); font-size: 14px; }

  @media print {
    .main-nav, .cohort-bar, .week-tabs, .action-bar, .print-btn-bar, .btn { display: none !important; }
    body { background: #fff; }
    .page { padding: 0; max-width: 100%; }
    .summary-section { break-inside: avoid; }
  }
  @media (max-width: 540px) {
    .form-cols { grid-template-columns: 1fr; }
    .cohort-actions { width: 100%; }
    .site-title { font-size: 22px; }
    .profile-weeks { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <header class="site-header">
    <div class="site-header-top">
      <div>
        <div class="site-title">Daily Training Updates</div>
        <div class="site-subtitle">4-week onboarding program tracker</div>
      </div>
      <div>
        <div class="save-indicator">
          <span class="save-dot" id="save-dot"></span>
          <span id="save-text">All changes saved</span>
        </div>
      </div>
    </div>
  </header>

  <div id="main-loading" class="loading">Loading saved data&hellip;</div>
  <div id="main-content" style="display:none;">

    <!-- Main nav -->
    <nav class="main-nav">
      <button class="nav-tab active" onclick="showView('updates')" id="tab-updates">Updates</button>
      <button class="nav-tab" onclick="showView('flagged')" id="tab-flagged">Flagged learners <span class="tab-badge" id="flag-count" style="display:none;">0</span></button>
      <button class="nav-tab" onclick="showView('profiles')" id="tab-profiles">Learner profiles</button>
      <button class="nav-tab" onclick="showView('summary')" id="tab-summary">Summary &amp; export</button>
      <button class="nav-tab" onclick="showView('comparison')" id="tab-comparison">Cohort comparison</button>
    </nav>

    <!-- Cohort bar -->
    <div class="cohort-bar">
      <label>Cohort</label>
      <select id="cohort-select" onchange="switchCohort()"></select>
      <div class="cohort-actions">
        <button class="btn btn-sm" onclick="openCohortModal()">+ New class</button>
        <button class="btn btn-sm" id="archive-btn" onclick="toggleArchive()">Archive</button>
        <button class="btn btn-primary btn-sm" onclick="openEntryModal()" id="log-btn">+ Log update</button>
      </div>
    </div>
    <div class="archived-notice" id="archived-notice" style="display:none;">This cohort is archived — view only.</div>

    <!-- ── UPDATES VIEW ── -->
    <div id="view-updates">
      <div class="week-tabs" id="week-tabs"></div>
      <div id="entries-area"></div>
    </div>

    <!-- ── FLAGGED VIEW ── -->
    <div id="view-flagged" style="display:none;">
      <div id="flagged-area"></div>
    </div>

    <!-- ── PROFILES VIEW ── -->
    <div id="view-profiles" style="display:none;">
      <div class="learner-list" id="learner-list"></div>
      <div id="profile-area"></div>
    </div>

    <!-- ── SUMMARY VIEW ── -->
    <div id="view-summary" style="display:none;">
      <div class="print-btn-bar">
        <button class="btn btn-sm" onclick="window.print()">🖨 Print / Save as PDF</button>
      </div>
      <div id="summary-area"></div>
    </div>

    <!-- ── COMPARISON VIEW ── -->
    <div id="view-comparison" style="display:none;">
      <div id="comparison-area"></div>
    </div>

  </div>
</div>

<!-- Entry Modal -->
<div class="modal-overlay" id="entry-modal">
  <div class="modal">
    <h2 id="entry-modal-title">Log daily update</h2>
    <div class="form-cols">
      <div class="form-row"><label>Date</label><input type="date" id="f-date"/></div>
      <div class="form-row"><label>Training week</label>
        <select id="f-week" onchange="onWeekChange()">
          <option value="1">Week 1 — Foundations</option>
          <option value="2">Week 2 — Policy training</option>
          <option value="3">Week 3 — Live claims</option>
          <option value="4">Week 4 — Deep dives</option>
        </select>
      </div>
    </div>
    <div class="form-cols">
      <div class="form-row"><label>Attendance</label>
        <select id="f-att">
          <option value="100">100% on time</option>
          <option value="late">Some late arrivals</option>
          <option value="absent">Absence(s) noted</option>
        </select>
      </div>
      <div class="form-row"><label>Overall vibe</label>
        <select id="f-vibe">
          <option value="">— select —</option>
          <option value="Highly engaged">Highly engaged</option>
          <option value="Good energy">Good energy</option>
          <option value="Quiet but on track">Quiet but on track</option>
          <option value="Mixed engagement">Mixed engagement</option>
          <option value="Needs attention">Needs attention</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>People updates</label><textarea id="f-people" placeholder="Attendance details, standouts, concerns…"></textarea></div>
    <div class="form-row"><label>Topics completed</label><textarea id="f-topics" placeholder="Modules, lessons, activities…"></textarea></div>
    <div class="form-row"><label>Plan for tomorrow</label><textarea id="f-tomorrow" placeholder="What's on the agenda…"></textarea></div>
    <div class="form-row"><label>Additional insights</label><textarea id="f-insights" placeholder="Timing notes, context for leadership…"></textarea></div>
    <div class="form-row"><label>Action items <span style="color:var(--ink3);font-weight:400;">(one per line)</span></label>
      <textarea id="f-actions" placeholder="Leave blank if none" style="min-height:44px;"></textarea>
    </div>
    <div id="scores-section" style="display:none;">
      <div class="divider"></div>
      <div class="form-row"><label>Assessment name</label><input id="f-exam" placeholder="e.g. Celebration of Learning #1"/></div>
      <div class="form-row">
        <label>Scores <span style="color:var(--ink3);font-weight:400;">(running averages calculated per week)</span></label>
        <div class="score-form-wrap" id="score-rows-form"></div>
        <button class="add-learner-btn" onclick="addScoreRow()">+ Add learner</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEntryModal()">Cancel</button>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API_KEY = '$2a$10$ZZbl3ldBfBsVHtIIjL1sx.8De5/AixFol11Qc6kQYtPGAuM6e2Ac.';
const BIN_ID  = '6a20376dda38895dfe814156';

// ─── State ────────────────────────────────────────────────────────────────────
let cohorts = [], activeCohortId = null, entries = [], activeWeek = 1;
let editingId = null, expandedIds = new Set(), activeView = 'updates';
let activeLearnerId = null, saveTimer = null;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function lsGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
function scClass(n) { return n>=90?'sc-hi':n>=80?'sc-mi':'sc-lo'; }
function attClass(v) { return v==='100'?'badge-ok':v==='late'?'badge-warn':'badge-alert'; }
function attLabel(v) { return v==='100'?'100% on time':v==='late'?'Late arrivals':'Absence noted'; }

// ─── Persist ──────────────────────────────────────────────────────────────────
function setStatus(s) {
  document.getElementById('save-dot').className = 'save-dot'+(s==='saving'?' saving':s==='error'?' error':'');
  document.getElementById('save-text').textContent = s==='saving'?'Saving…':s==='error'?'Save failed':'All changes saved';
}
function getAllEntries() { const a=lsGet('training-all-entries')||{}; a[activeCohortId]=entries; return a; }
async function pushCloud(data) {
  setStatus('saving');
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(data)});
    setStatus('saved');
  } catch { setStatus('error'); }
}
async function persist() {
  const all = getAllEntries();
  lsSet('training-cohorts', cohorts);
  lsSet('training-all-entries', all);
  lsSet('training-active-cohort', activeCohortId);
  lsSet('training-active-week', activeWeek);
  await pushCloud({cohorts, activeCohortId, allEntries: all, activeWeek});
}
function debounceSave() { clearTimeout(saveTimer); saveTimer = setTimeout(persist, 800); }

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  let state = null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const j = await r.json(); state = j.record||null;
  } catch {}
  if (!state) {
    const lc = lsGet('training-cohorts'), le = lsGet('training-all-entries');
    if (lc) state = {cohorts:lc, allEntries:le||{}, activeCohortId:lsGet('training-active-cohort'), activeWeek:lsGet('training-active-week')||1};
  }
  if (state && state.cohorts && state.cohorts.length) {
    cohorts = state.cohorts;
    const all = state.allEntries||{};
    activeCohortId = state.activeCohortId||cohorts[0].id;
    entries = all[activeCohortId]||[];
    activeWeek = state.activeWeek||1;
  } else {
    const sid = uid();
    cohorts = [{id:sid, name:'Class of 05/04/2025', startDate:'2025-05-04', archived:false}];
    activeCohortId = sid; entries = getSeedEntries(); activeWeek = 1;
    await persist();
  }
  document.getElementById('main-loading').style.display='none';
  document.getElementById('main-content').style.display='block';
  buildCohortSelect(); buildWeekTabs(); renderEntries(); updateFlagBadge();
}

// ─── View switcher ────────────────────────────────────────────────────────────
function showView(v) {
  activeView = v;
  ['updates','flagged','profiles','summary','comparison'].forEach(x => {
    document.getElementById('view-'+x).style.display = x===v?'block':'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
  });
  document.getElementById('log-btn').style.display = v==='updates'?'':'none';
  if (v==='flagged') renderFlagged();
  if (v==='profiles') renderProfiles();
  if (v==='summary') renderSummary();
  if (v==='comparison') renderComparison();
}

// ─── Cohorts ──────────────────────────────────────────────────────────────────
function buildCohortSelect() {
  document.getElementById('cohort-select').innerHTML = cohorts.map(c =>
    `<option value="${c.id}" ${c.id===activeCohortId?'selected':''}>${escHtml(c.name)}${c.archived?' (archived)':''}</option>`
  ).join('');
  updateArchiveUI();
}
function updateArchiveUI() {
  const c = cohorts.find(x=>x.id===activeCohortId);
  const archived = c && c.archived;
  document.getElementById('archived-notice').style.display = archived?'block':'none';
  document.getElementById('archive-btn').textContent = archived?'Unarchive':'Archive';
}
async function switchCohort() {
  const all = lsGet('training-all-entries')||{}; all[activeCohortId]=entries; lsSet('training-all-entries',all);
  activeCohortId = document.getElementById('cohort-select').value;
  entries = (lsGet('training-all-entries')||{})[activeCohortId]||[];
  activeWeek=1; expandedIds=new Set(); activeLearnerId=null;
  buildWeekTabs(); renderEntries(); updateArchiveUI(); updateFlagBadge();
  if (activeView!=='updates') showView(activeView);
}
async function toggleArchive() {
  cohorts = cohorts.map(c=>c.id===activeCohortId?{...c,archived:!c.archived}:c);
  buildCohortSelect(); debounceSave();
}
function openCohortModal() { document.getElementById('c-name').value=''; document.getElementById('c-date').value=new Date().toISOString().split('T')[0]; document.getElementById('cohort-modal').classList.add('open'); }
function closeCohortModal() { document.getElementById('cohort-modal').classList.remove('open'); }
async function createCohort() {
  const name=document.getElementById('c-name').value.trim(); if(!name){document.getElementById('c-name').focus();return;}
  const all=lsGet('training-all-entries')||{}; all[activeCohortId]=entries; lsSet('training-all-entries',all);
  const nc={id:uid(),name,startDate:document.getElementById('c-date').value,archived:false};
  cohorts.push(nc); activeCohortId=nc.id; entries=[]; activeWeek=1; expandedIds=new Set(); activeLearnerId=null;
  closeCohortModal(); buildCohortSelect(); buildWeekTabs(); renderEntries(); updateFlagBadge(); await persist();
}

// ─── Week tabs ────────────────────────────────────────────────────────────────
const WEEKS=[{id:1,label:'Week 1',sub:'Foundations'},{id:2,label:'Week 2',sub:'Policy training'},{id:3,label:'Week 3',sub:'Live claims'},{id:4,label:'Week 4',sub:'Deep dives'}];
function buildWeekTabs() {
  document.getElementById('week-tabs').innerHTML = WEEKS.map(w=>{
    const cnt=entries.filter(e=>e.week===w.id).length;
    return `<button class="week-tab ${activeWeek===w.id?'active':''}" onclick="setWeek(${w.id})">${w.label}<span class="week-tab-sub">${w.sub}${cnt>0?' · '+cnt:''}</span></button>`;
  }).join('');
}
function setWeek(id){activeWeek=id;buildWeekTabs();renderEntries();}

// ─── Scoring helpers ──────────────────────────────────────────────────────────
function runAvg(name, week) {
  const scores=[];
  entries.filter(e=>e.week===week&&e.scores).forEach(e=>{
    const r=e.scores.find(s=>s.name.trim().toLowerCase()===name.trim().toLowerCase());
    if(r&&r.score!=='') scores.push(parseFloat(r.score));
  });
  return scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
}

// ─── Updates view ─────────────────────────────────────────────────────────────
function renderEntries() {
  const area=document.getElementById('entries-area');
  const list=entries.filter(e=>e.week===activeWeek).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!list.length){area.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>No updates logged for this week yet.</div>`;return;}
  area.innerHTML=list.map(e=>{
    const open=expandedIds.has(e.id);
    const prev=(e.topics||'').split('\n')[0].slice(0,90)+((e.topics||'').length>90?'…':'');
    const hasS=e.scores&&e.scores.filter(s=>s.name).length>0;
    const hasA=e.actions&&e.actions.trim();
    return `<div class="entry-card">
      <div class="entry-header" onclick="toggleEntry('${e.id}')">
        <span class="entry-date">${fmtDate(e.date)}</span>
        <span class="badge ${attClass(e.att)}">${attLabel(e.att)}</span>
        ${e.vibe?`<span class="badge badge-neutral">${escHtml(e.vibe)}</span>`:''}
        ${!open?`<span class="entry-preview">${escHtml(prev)}</span>`:''}
        <div class="entry-row-actions">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editEntry('${e.id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteEntry('${e.id}')">🗑️</button>
          <span class="chevron ${open?'open':''}">⌄</span>
        </div>
      </div>
      ${open?`<div class="entry-body">
        ${e.people?`<div class="entry-section"><div class="entry-section-label">People updates</div><div class="entry-text">${escHtml(e.people)}</div></div>`:''}
        ${e.topics?`<div class="entry-section"><div class="entry-section-label">Topics completed</div><div class="entry-text">${escHtml(e.topics)}</div></div>`:''}
        ${e.tomorrow?`<div class="entry-section"><div class="entry-section-label">Plan for tomorrow</div><div class="entry-text">${escHtml(e.tomorrow)}</div></div>`:''}
        ${e.insights?`<div class="entry-section"><div class="entry-section-label">Additional insights</div><div class="entry-text">${escHtml(e.insights)}</div></div>`:''}
        ${hasS?`<div class="entry-section"><div class="entry-section-label">${escHtml(e.examName||'Assessment')} scores</div>
          <table class="score-table"><thead><tr><th>Learner</th><th>This score</th><th>Running avg</th></tr></thead><tbody>
          ${e.scores.filter(s=>s.name).map(s=>{const sc=s.score!==''?parseFloat(s.score):null;const avg=runAvg(s.name, e.week);return`<tr><td>${escHtml(s.name)}</td><td>${sc!==null?`<span class="score-pill ${scClass(sc)}">${sc}%</span>`:'—'}</td><td>${avg!==null?`<span class="score-pill ${scClass(avg)}">${avg}%</span>`:'—'}</td></tr>`;}).join('')}
          </tbody></table></div>`:''}
        ${hasA?`<div class="entry-section"><div class="entry-section-label">Action items</div><ul class="action-list">${e.actions.split('\n').filter(l=>l.trim()).map(l=>`<li>${escHtml(l)}</li>`).join('')}</ul></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}
function toggleEntry(id){expandedIds.has(id)?expandedIds.delete(id):expandedIds.add(id);renderEntries();}
async function deleteEntry(id){if(!confirm('Delete this update?'))return;entries=entries.filter(e=>e.id!==id);expandedIds.delete(id);renderEntries();buildWeekTabs();updateFlagBadge();debounceSave();}

// ─── FLAG logic ───────────────────────────────────────────────────────────────
function getAllLearnerNames() {
  const names=new Set();
  entries.forEach(e=>{
    if(e.scores) e.scores.forEach(s=>{if(s.name)names.add(s.name.trim());});
    if(e.people){
      const txt=e.people;
      // extract names mentioned alongside attendance/action context
    }
  });
  // Also pull from action items text
  entries.forEach(e=>{
    if(e.actions) {
      const words=e.actions.split(/[\s,]+/);
      // names are in scores already, this is covered
    }
  });
  return [...names];
}

function getFlaggedLearners() {
  const names=getAllLearnerNames();
  const flagged=[];
  names.forEach(name=>{
    const reasons=[];
    // 1. Attendance: count entries where name appears in people text with late/absent context
    const attEntries=entries.filter(e=>(e.att==='late'||e.att==='absent')&&e.people&&e.people.toLowerCase().includes(name.toLowerCase()));
    if(attEntries.length>=2) reasons.push(`${attEntries.length} entries with late arrivals or absences noted`);
    // 2. Score below 80
    const lowScores=[];
    entries.forEach(e=>{
      if(e.scores){const r=e.scores.find(s=>s.name.trim().toLowerCase()===name.toLowerCase());if(r&&r.score!==''&&parseFloat(r.score)<80)lowScores.push(`${e.examName||'Assessment'}: ${r.score}%`);}
    });
    if(lowScores.length) reasons.push('Score below 80%: '+lowScores.join(', '));
    // 3. Mentioned in action items
    const actionMentions=entries.filter(e=>e.actions&&e.actions.toLowerCase().includes(name.toLowerCase()));
    if(actionMentions.length) reasons.push(`Mentioned in action items (${actionMentions.length} time${actionMentions.length>1?'s':''})`);
    if(reasons.length) flagged.push({name,reasons});
  });
  return flagged;
}

function updateFlagBadge() {
  const f=getFlaggedLearners();
  const badge=document.getElementById('flag-count');
  if(f.length>0){badge.textContent=f.length;badge.style.display='';}
  else{badge.style.display='none';}
}

function renderFlagged() {
  const area=document.getElementById('flagged-area');
  const flagged=getFlaggedLearners();
  if(!flagged.length){
    area.innerHTML=`<div class="no-flags"><div class="nf-icon">✅</div>No flagged learners for this cohort.<br>Flags appear when someone has 2+ attendance issues, a score below 80%, or is mentioned in action items.</div>`;
    return;
  }
  area.innerHTML=`<div class="flagged-grid">${flagged.map(f=>`
    <div class="flag-card">
      <div class="flag-card-name">🚩 ${escHtml(f.name)}</div>
      ${f.reasons.map(r=>`<div class="flag-reason">${escHtml(r)}</div>`).join('')}
      <div style="margin-top:10px;">
        <button class="btn btn-sm" onclick="showLearnerProfile('${escHtml(f.name)}')">View profile →</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── Learner profiles ─────────────────────────────────────────────────────────
function renderProfiles() {
  const names=getAllLearnerNames();
  const flagged=getFlaggedLearners().map(f=>f.name.toLowerCase());
  const listEl=document.getElementById('learner-list');
  if(!names.length){listEl.innerHTML='<p style="font-size:13px;color:var(--ink3);">No learners found. Scores need to be logged in Week 2 entries to populate profiles.</p>';document.getElementById('profile-area').innerHTML='';return;}
  listEl.innerHTML=names.map(n=>`
    <div class="learner-chip ${activeLearnerId===n?'active':''}" onclick="showLearnerProfile('${escHtml(n)}')">
      ${escHtml(n)}
      ${flagged.includes(n.toLowerCase())?`<span class="lc-flag">🚩 flagged</span>`:''}
    </div>`).join('');
  if(activeLearnerId) renderProfileCard(activeLearnerId);
  else document.getElementById('profile-area').innerHTML='<p style="font-size:13px;color:var(--ink3);text-align:center;padding:1.5rem;">Select a learner above to view their profile.</p>';
}

function showLearnerProfile(name) {
  activeLearnerId=name;
  if(activeView!=='profiles') showView('profiles');
  else { renderProfiles(); }
}

function renderProfileCard(name) {
  const area=document.getElementById('profile-area');
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  // Gather week data
  const weekStats=WEEKS.map(w=>{
    const wEntries=entries.filter(e=>e.week===w.id);
    const attIssues=wEntries.filter(e=>(e.att==='late'||e.att==='absent')&&e.people&&e.people.toLowerCase().includes(name.toLowerCase())).length;
    const scores=[];
    wEntries.forEach(e=>{if(e.scores){const r=e.scores.find(s=>s.name.trim().toLowerCase()===name.toLowerCase());if(r&&r.score!=='')scores.push(parseFloat(r.score));}});
    const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
    return{...w, attIssues, scores, avg};
  });
  // Mentions across all entries
  const mentions=[];
  entries.forEach(e=>{
    const fields=[{label:'People updates',val:e.people},{label:'Action items',val:e.actions},{label:'Insights',val:e.insights}];
    fields.forEach(f=>{
      if(f.val&&f.val.toLowerCase().includes(name.toLowerCase())){
        mentions.push({date:e.date,label:f.label,text:f.val});
      }
    });
  });
  mentions.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const w1Avg=runAvg(name,1); const w2Avg=runAvg(name,2);
  const flagged=getFlaggedLearners().find(f=>f.name.toLowerCase()===name.toLowerCase());

  area.innerHTML=`<div class="profile-card">
    <div class="profile-header">
      <div class="profile-avatar">${initials}</div>
      <div>
        <div class="profile-name">${escHtml(name)}</div>
        <div class="profile-meta">
          ${w1Avg!==null?`Wk 1 avg: <strong>${w1Avg}%</strong> &nbsp;·&nbsp;`:''}${w2Avg!==null?`Wk 2 avg: <strong>${w2Avg}%</strong> &nbsp;·&nbsp;`:''}
          ${flagged?`<span style="color:var(--red-tx);">🚩 ${flagged.reasons.length} flag${flagged.reasons.length>1?'s':''}</span>`:'<span style="color:var(--green-tx);">✓ No flags</span>'}
        </div>
      </div>
    </div>
    <div class="profile-weeks">
      ${weekStats.map(w=>`<div class="profile-week-card">
        <div class="profile-week-label">${w.label} — ${w.sub}</div>
        ${w.scores.length?w.scores.map((s,i)=>`<div class="profile-week-stat"><span class="score-pill ${scClass(s)}">${s}%</span> <span style="font-size:11px;color:var(--ink3);">exam ${i+1}</span></div>`).join(''):`<div class="profile-week-stat" style="color:var(--ink3);">No assessments</div>`}
        ${w.attIssues>0?`<div class="profile-week-stat" style="color:var(--amber-tx);font-size:12px;margin-top:4px;">⚠ ${w.attIssues} attendance note${w.attIssues>1?'s':''}</div>`:''}
      </div>`).join('')}
    </div>
    ${mentions.length?`<div class="profile-section">
      <div class="profile-section-label">Mentions across all updates (${mentions.length})</div>
      <div class="mentions-list">
        ${mentions.map(m=>`<div class="mention-item">
          <div class="mention-date">${fmtDate(m.date)}<br><span style="color:var(--ink3);font-size:10px;">${m.label}</span></div>
          <div class="mention-text">${escHtml(m.text)}</div>
        </div>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

// ─── Summary / export ─────────────────────────────────────────────────────────
function renderSummary() {
  const area=document.getElementById('summary-area');
  const cohort=cohorts.find(c=>c.id===activeCohortId);
  const flagged=getFlaggedLearners();
  const names=getAllLearnerNames();

  // Week recaps
  const weekRecaps=WEEKS.map(w=>{
    const wEntries=entries.filter(e=>e.week===w.id).sort((a,b)=>new Date(a.date)-new Date(b.date));
    return{...w, entries:wEntries};
  }).filter(w=>w.entries.length);

  // Score table per learner
  const scoresByLearner={};
  names.forEach(n=>{
    const row={name:n,scores:{},avg:null};
    entries.filter(e=>(e.week===1||e.week===2)&&e.scores).forEach(e=>{
      const r=e.scores.find(s=>s.name.trim().toLowerCase()===n.toLowerCase());
      if(r&&r.score!=='') row.scores[e.examName||'Assessment']=parseFloat(r.score);
    });
    scoresByLearner[n]=row;
  });
  const examNames=[...new Set(entries.filter(e=>(e.week===1||e.week===2)&&e.examName).map(e=>e.examName))];

  area.innerHTML=`
    <div class="summary-meta">
      <strong>${escHtml(cohort?cohort.name:'')}</strong> &nbsp;·&nbsp;
      Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} &nbsp;·&nbsp;
      ${entries.length} total updates logged
    </div>

    ${flagged.length?`<div class="summary-section">
      <div class="summary-section-title">🚩 Flagged learners (${flagged.length})</div>
      <div class="summary-flags">
        ${flagged.map(f=>`<div class="summary-flag-row">
          <div class="summary-flag-name">${escHtml(f.name)}</div>
          <div class="summary-flag-reasons">${f.reasons.map(r=>escHtml(r)).join('<br>')}</div>
        </div>`).join('')}
      </div>
    </div>`:''}

    ${names.length&&examNames.length?`<div class="summary-section">
      <div class="summary-section-title">📊 Assessment scores &amp; averages</div>
      <table class="score-table">
        <thead><tr><th>Learner</th>${examNames.map(e=>`<th>${escHtml(e)}</th>`).join('')}<th>Wk 1 avg</th><th>Wk 2 avg</th></tr></thead>
        <tbody>
          ${names.map(n=>{const row=scoresByLearner[n];return`<tr>
            <td style="font-weight:500;">${escHtml(n)}</td>
            ${examNames.map(ex=>{const s=row.scores[ex];return`<td>${s!==undefined?`<span class="score-pill ${scClass(s)}">${s}%</span>`:'—'}</td>`;}).join('')}
            <td>${row.avg!==null?`<span class="score-pill ${scClass(row.avg)}">${row.avg}%</span>`:'—'}</td>
          </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`:''}

    <div class="summary-section">
      <div class="summary-section-title">📅 Week-by-week recap</div>
      ${weekRecaps.map(w=>`<div class="summary-week-block">
        <div class="summary-week-title">
          ${w.label} — ${w.sub}
          <span class="badge badge-neutral">${w.entries.length} update${w.entries.length>1?'s':''}</span>
        </div>
        ${w.entries.map(e=>`<div style="margin-bottom:10px;padding:10px 12px;background:var(--cream);border-radius:8px;border:1px solid var(--rule);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <strong style="font-size:13px;">${fmtDate(e.date)}</strong>
            <span class="badge ${attClass(e.att)}">${attLabel(e.att)}</span>
            ${e.vibe?`<span class="badge badge-neutral">${escHtml(e.vibe)}</span>`:''}
          </div>
          ${e.people?`<div style="font-size:12px;color:var(--ink2);line-height:1.6;white-space:pre-wrap;">${escHtml(e.people)}</div>`:''}
          ${e.actions&&e.actions.trim()?`<div style="margin-top:6px;font-size:12px;color:var(--amber-tx);font-weight:500;">Actions: ${escHtml(e.actions.split('\n').filter(l=>l.trim()).join(' · '))}</div>`:''}
        </div>`).join('')}
      </div>`).join('')}
    </div>`;
}

// ─── Cohort comparison ────────────────────────────────────────────────────────
function renderComparison() {
  const area=document.getElementById('comparison-area');
  if(cohorts.length<2){
    area.innerHTML=`<div class="comp-empty">📊 Cohort comparison will appear once you have more than one class.<br><br><button class="btn" onclick="openCohortModal()">+ Create a new class</button></div>`;
    return;
  }
  const allEntries=lsGet('training-all-entries')||{}; allEntries[activeCohortId]=entries;

  const stats=cohorts.map(c=>{
    const cEntries=allEntries[c.id]||[];
    // Attendance rate: % of entries with 100% on time
    const total=cEntries.length;
    const onTime=cEntries.filter(e=>e.att==='100').length;
    const attRate=total?Math.round((onTime/total)*100):null;
    // Avg assessment score
    const allScores=[];
    cEntries.forEach(e=>{if(e.scores)e.scores.forEach(s=>{if(s.score!=='')allScores.push(parseFloat(s.score));});});
    const avgScore=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):null;
    // Flagged count
    const learnerNames=new Set();
    cEntries.forEach(e=>{if(e.scores)e.scores.forEach(s=>{if(s.name)learnerNames.add(s.name.trim());});});
    let flagCount=0;
    learnerNames.forEach(name=>{
      const attIssues=cEntries.filter(e=>(e.att==='late'||e.att==='absent')&&e.people&&e.people.toLowerCase().includes(name.toLowerCase())).length;
      const lowScores=cEntries.some(e=>e.scores&&e.scores.find(s=>s.name.trim().toLowerCase()===name.toLowerCase()&&s.score!==''&&parseFloat(s.score)<80));
      const inActions=cEntries.some(e=>e.actions&&e.actions.toLowerCase().includes(name.toLowerCase()));
      if(attIssues>=2||lowScores||inActions) flagCount++;
    });
    // Week completion
    const weekCompletion=WEEKS.map(w=>({...w, count:cEntries.filter(e=>e.week===w.id).length}));
    return{cohort:c, total, onTime, attRate, avgScore, flagCount, weekCompletion, learnerCount:learnerNames.size};
  });

  const maxScore=Math.max(...stats.map(s=>s.avgScore||0));
  const maxAtt=Math.max(...stats.map(s=>s.attRate||0));

  area.innerHTML=`
    <div style="font-size:13px;color:var(--ink3);margin-bottom:1.25rem;">${cohorts.length} cohorts compared &mdash; scroll right on mobile if needed.</div>
    <div class="comparison-grid">
      ${stats.map(s=>`<div class="comparison-card">
        <div class="comparison-cohort-name">${escHtml(s.cohort.name)}</div>
        <div class="comparison-cohort-sub">${s.cohort.archived?'Archived · ':''} ${s.total} updates · ${s.learnerCount} learner${s.learnerCount!==1?'s':''}</div>
        <div class="comp-stat"><span class="comp-stat-label">Avg assessment score</span><span class="comp-stat-value">${s.avgScore!==null?s.avgScore+'%':'—'}</span></div>
        <div class="comp-stat"><span class="comp-stat-label">On-time attendance</span><span class="comp-stat-value">${s.attRate!==null?s.attRate+'%':'—'}</span></div>
        <div class="comp-stat"><span class="comp-stat-label">Flagged learners</span><span class="comp-stat-value" style="${s.flagCount>0?'color:var(--red-tx);':''}">${s.flagCount}</span></div>
        <div class="comp-bar-wrap">
          ${s.avgScore!==null?`<div class="comp-bar-label"><span>Score</span><span>${s.avgScore}%</span></div>
          <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${maxScore?Math.round((s.avgScore/maxScore)*100):0}%;background:${s.avgScore>=85?'var(--green-tx)':s.avgScore>=75?'var(--amber-tx)':'var(--red-tx)'};"></div></div>`:''}
          ${s.attRate!==null?`<div class="comp-bar-label" style="margin-top:6px;"><span>Attendance</span><span>${s.attRate}%</span></div>
          <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${maxAtt?Math.round((s.attRate/maxAtt)*100):0}%;"></div></div>`:''}
        </div>
        <div style="margin-top:10px;">
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:5px;">Week completion</div>
          ${s.weekCompletion.map(w=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid var(--rule);"><span style="color:var(--ink3);">${w.label}</span><span style="color:var(--ink);font-weight:500;">${w.count} update${w.count!==1?'s':''}</span></div>`).join('')}
        </div>
      </div>`).join('')}
    </div>`;
}

// ─── Entry form ───────────────────────────────────────────────────────────────
function onWeekChange(){document.getElementById('scores-section').style.display=(document.getElementById('f-week').value==='1'||document.getElementById('f-week').value==='2')?'block':'none';}
function addScoreRow(name='',score=''){
  const wrap=document.getElementById('score-rows-form');
  const d=document.createElement('div'); d.className='score-form-row';
  d.innerHTML=`<input placeholder="Learner name" value="${escHtml(name)}" style="font-size:12px;padding:5px 8px;"/>
    <input type="number" min="0" max="100" placeholder="Score %" value="${escHtml(score)}" style="font-size:12px;padding:5px 8px;"/>
    <button onclick="this.closest('.score-form-row').remove()" style="background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1;">×</button>`;
  wrap.appendChild(d);
}
function getScoreRows(){
  const rows = Array.from(document.querySelectorAll('#score-rows-form .score-form-row')).map(r=>{
    const ii=r.querySelectorAll('input'); return{name:ii[0].value.trim(),score:ii[1].value};
  }).filter(r=>r.name);
  // Auto-merge duplicate learner names — average all scores for the same name
  const merged = {};
  rows.forEach(r=>{
    const key = r.name.trim().toLowerCase();
    if(!merged[key]) merged[key] = {name:r.name, scores:[]};
    if(r.score !== '') merged[key].scores.push(parseFloat(r.score));
  });
  return Object.values(merged).map(m=>({
    name: m.name,
    score: m.scores.length ? String(Math.round(m.scores.reduce((a,b)=>a+b,0)/m.scores.length)) : ''
  }));
}
function openEntryModal(){
  editingId=null;
  document.getElementById('entry-modal-title').textContent='Log daily update';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-week').value=activeWeek;
  document.getElementById('f-att').value='100'; document.getElementById('f-vibe').value='';
  ['f-people','f-topics','f-tomorrow','f-insights','f-actions','f-exam'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('score-rows-form').innerHTML='';
  document.getElementById('scores-section').style.display=(activeWeek===1||activeWeek===2)?'block':'none';
  document.getElementById('entry-modal').classList.add('open');
}
function editEntry(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  editingId=id;
  document.getElementById('entry-modal-title').textContent='Edit update';
  document.getElementById('f-date').value=e.date; document.getElementById('f-week').value=e.week;
  document.getElementById('f-att').value=e.att||'100'; document.getElementById('f-vibe').value=e.vibe||'';
  document.getElementById('f-people').value=e.people||''; document.getElementById('f-topics').value=e.topics||'';
  document.getElementById('f-tomorrow').value=e.tomorrow||''; document.getElementById('f-insights').value=e.insights||'';
  document.getElementById('f-actions').value=e.actions||''; document.getElementById('f-exam').value=e.examName||'';
  document.getElementById('score-rows-form').innerHTML='';
  if(e.scores) e.scores.forEach(s=>addScoreRow(s.name,s.score));
  document.getElementById('scores-section').style.display=(e.week===1||e.week===2)?'block':'none';
  document.getElementById('entry-modal').classList.add('open');
}
function closeEntryModal(){document.getElementById('entry-modal').classList.remove('open');}
async function saveEntry(){
  const date=document.getElementById('f-date').value; if(!date) return;
  const week=parseInt(document.getElementById('f-week').value);
  const obj={id:editingId||uid(),date,week,
    att:document.getElementById('f-att').value, vibe:document.getElementById('f-vibe').value,
    people:document.getElementById('f-people').value.trim(), topics:document.getElementById('f-topics').value.trim(),
    tomorrow:document.getElementById('f-tomorrow').value.trim(), insights:document.getElementById('f-insights').value.trim(),
    actions:document.getElementById('f-actions').value.trim(),
    scores:(week===1||week===2)?getScoreRows():[], examName:document.getElementById('f-exam').value.trim()};
  if(editingId) entries=entries.map(e=>e.id===editingId?obj:e); else entries.push(obj);
  activeWeek=week; expandedIds.add(obj.id);
  closeEntryModal(); buildWeekTabs(); renderEntries(); updateFlagBadge(); debounceSave();
}

['entry-modal','cohort-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');});
});
